name: Deploy para VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: https://dncsspudxtnrppchpldu.supabase.co
          VITE_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRuY3NzcHVkeHRucnBwY2hwbGR1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwMTUyNTgsImV4cCI6MjA5NjU5MTI1OH0.Lkh2G5L2MiGoDpB52qS4HoSBFie-PzNCgV2YgzlymPY
          VITE_OPENROUTER_KEY: ${{ secrets.OPENROUTER_KEY }}

      - name: Enviar para VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 2.24.201.92
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "dist/*"
          target: /www/wwwroot/app_mkorp_com_br
          strip_components: 1

      - name: Health-check pós-deploy (confere se o bundle publicado bate com o buildado)
        run: |
          set -e

          # Hash do bundle que acabou de ser buildado (é o que deveria estar no ar)
          ESPERADO=$(grep -oE '/assets/index-[A-Za-z0-9_-]+\.js' dist/index.html | head -1)
          if [ -z "$ESPERADO" ]; then
            echo "::error::Não encontrei referência ao bundle JS em dist/index.html — build inválido."
            exit 1
          fi
          echo "Bundle esperado: $ESPERADO"

          # Espera a propagação (nginx/VPS) e tenta algumas vezes
          OK=0
          for i in 1 2 3 4 5 6; do
            sleep 10
            PUBLICADO=$(curl -s --max-time 15 "https://app.mkorp.com.br/" | grep -oE '/assets/index-[A-Za-z0-9_-]+\.js' | head -1 || true)
            echo "Tentativa $i — bundle publicado: ${PUBLICADO:-<vazio>}"
            if [ "$PUBLICADO" = "$ESPERADO" ]; then
              OK=1
              break
            fi
          done

          if [ "$OK" != "1" ]; then
            echo "::error::Deploy não propagou! Produção está servindo '$PUBLICADO', esperado '$ESPERADO'. O site pode estar com uma versão antiga."
            exit 1
          fi

          echo "✅ Health-check OK — produção está servindo o bundle correto."
